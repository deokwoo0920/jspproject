                                    <p class="text-xs text-indigo-700">임포트 시 반드시 jakarta 패키지를 사용해야 합니다.</p>
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-800 rounded-lg shadow-lg overflow-hidden flex flex-col h-[500px]">
                            <div class="flex bg-slate-900 text-slate-400 text-xs border-b border-slate-700">
                                <button onclick="showCode('servlet')" id="tab-servlet" class="px-4 py-2 bg-slate-800 text-green-400 border-t-2 border-green-400">HelloServlet.java</button>
                                <button onclick="showCode('jsp')" id="tab-jsp" class="px-4 py-2 hover:bg-slate-800 hover:text-slate-200 transition-colors">index.jsp</button>
                            </div>
                            <div class="p-4 overflow-auto flex-1 font-mono text-sm">

    <span class="text-purple-400">protected void</span> doGet(...) {
        req.setAttribute(<span class="text-green-300">"msg"</span>, <span class="text-green-300">"Hello World"</span>);

                        </div>

                `
            },
            jakarta: {
                title: "5. Jakarta EE vs J2EE: 변경 사항 분석",
                intro: "기술 스택의 변화를 시각적으로 이해합니다.",
                content: `
                    <div class="max-w-4xl mx-auto space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                                <h4 class="font-bold text-slate-800 text-center mb-4">EE 버전별 현대화 지수</h4>
                                <div class="chart-container">
                                    <canvas id="jakartaChart"></canvas>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 h-full">
                                    <h4 class="font-bold text-slate-800 mb-3">javax → jakarta</h4>
                                    <p class="text-sm text-slate-600 leading-relaxed">
                                        Oracle의 상표권 문제로 패키지명이 변경되었습니다. 2020년 이후 기술은 모두 <code>jakarta</code>를 사용합니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            }
        };

        // --- 2. UI Logic Functions ---
        function navigateTo(sectionKey) {
            if (!contentData[sectionKey]) return;
            state.currentSection = sectionKey;
            
            // Update Sidebar UI
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('step-active');
                btn.classList.add('step-inactive');
            });
            const activeBtn = document.getElementById(`nav-${sectionKey}`);
            if(activeBtn) {
                activeBtn.classList.remove('step-inactive');
                activeBtn.classList.add('step-active');
            }

            // Render Content
            const mainContent = document.getElementById('main-content');
            const data = contentData[sectionKey];
            
            mainContent.innerHTML = `
                <div class="animate-fade-in">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">${data.title}</h2>
                    ${data.intro ? `<p class="text-slate-500 mb-8 pb-4 border-b border-slate-200">${data.intro}</p>` : ''}
                    ${data.content}
                </div>
            `;

            if (sectionKey === 'jakarta') {
                renderChart();
            }
        }

        function toggleCheck(key) {
            const el = document.getElementById(`check-${key}`);
            state.progress[key] = !state.progress[key];
            
            if(state.progress[key]) {
                el.classList.remove('border-slate-400');
                el.classList.add('bg-green-500', 'border-green-500');
            } else {
                el.classList.add('border-slate-400');
                el.classList.remove('bg-green-500', 'border-green-500');
            }
            updateProgressBar();
        }

        function updateProgressBar() {
            const total = Object.keys(state.progress).length;
            const current = Object.values(state.progress).filter(Boolean).length;
            const percent = Math.round((current / total) * 100);
            
            const pb = document.getElementById('progress-bar');
            const pt = document.getElementById('overall-progress');
            if(pb) pb.style.width = `${percent}%`;
            if(pt) pt.innerText = `${percent}%`;
        }

        function toggleServer(server) {
            const tomcatBtn = document.getElementById('btn-tomcat');
            const payaraBtn = document.getElementById('btn-payara');
            const tomcatContent = document.getElementById('content-tomcat');
            const payaraContent = document.getElementById('content-payara');

            if (server === 'tomcat') {
                tomcatBtn.classList.add('bg-white', 'shadow', 'text-slate-800');
                payaraBtn.classList.remove('bg-white', 'shadow', 'text-slate-800');
                tomcatContent.classList.remove('hidden');
                payaraContent.classList.add('hidden');
            } else {
                payaraBtn.classList.add('bg-white', 'shadow', 'text-slate-800');
                tomcatBtn.classList.remove('bg-white', 'shadow', 'text-slate-800');
                payaraContent.classList.remove('hidden');
                tomcatContent.classList.add('hidden');
            }
        }

        function showCode(type) {
            const btnServlet = document.getElementById('tab-servlet');
            const btnJsp = document.getElementById('tab-jsp');
            const codeServlet = document.getElementById('code-servlet');
            const codeJsp = document.getElementById('code-jsp');

            if (type === 'servlet') {
                btnServlet.classList.add('bg-slate-800', 'text-green-400', 'border-t-2', 'border-green-400');
                btnJsp.classList.remove('bg-slate-800', 'text-green-400', 'border-t-2', 'border-green-400');
                codeServlet.classList.remove('hidden');
                codeJsp.classList.add('hidden');
            } else {
                btnJsp.classList.add('bg-slate-800', 'text-green-400', 'border-t-2', 'border-green-400');
                btnServlet.classList.remove('bg-slate-800', 'text-green-400', 'border-t-2', 'border-green-400');
                codeJsp.classList.remove('hidden');
                codeServlet.classList.add('hidden');
            }
        }

        function renderChart() {
            const canvas = document.getElementById('jakartaChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Java EE 8', 'Jakarta EE 9', 'Jakarta EE 10', 'Jakarta EE 11'],
                    datasets: [{
                        label: '현대화 수준',
                        data: [40, 60, 85, 100],
                        backgroundColor: ['#94a3b8', '#64748b', '#6366f1', '#4f46e5'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 100 } }
                }
            });
        }

        // --- 3. Entry Point ---
        window.addEventListener('load', () => {
            navigateTo('intro');
        });

    </script>
</body>
</html>
